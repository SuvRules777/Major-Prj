<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fish Biomass Capture</title>
  <style>
    :root {
      --bg-1: #021014;
      --bg-2: #073642;
      --card: rgba(255, 255, 255, 0.1);
      --text: #f4fbff;
      --accent: #00d9c0;
      --accent-2: #ffc857;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 20%, #0d5c63, transparent 45%),
                  radial-gradient(circle at 85% 15%, #2f4858, transparent 40%),
                  linear-gradient(135deg, var(--bg-1), var(--bg-2));
      padding: 16px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .panel {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 12px;
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
      letter-spacing: 0.02em;
    }

    .muted {
      margin: 0;
      opacity: 0.88;
      font-size: 0.95rem;
    }

    .video-wrap {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: #001d27;
    }

    video {
      width: 100%;
      display: block;
      aspect-ratio: 4 / 3;
      object-fit: cover;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .controls label {
      display: grid;
      gap: 4px;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 10px;
      color: var(--text);
      background: rgba(0, 0, 0, 0.2);
      font-size: 1rem;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      color: #04212b;
      background: var(--accent);
      font-weight: 600;
    }

    button.secondary {
      background: var(--accent-2);
      color: #2b1b00;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      min-height: 1.2rem;
      margin-top: 10px;
      font-size: 0.9rem;
    }

    .error { color: var(--danger); }

    .result-list {
      margin: 10px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .result-list li {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 10px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    @media (max-width: 560px) {
      .controls { grid-template-columns: 1fr; }
      h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="panel">
      <h1>Fish Biomass Capture</h1>
      <p class="muted">Open this page on your phone, point at the tank, and tap capture.</p>
    </section>

    <section class="panel">
      <div class="video-wrap">
        <video id="camera" autoplay playsinline muted></video>
      </div>

      <div class="controls">
        <label>
          Confidence (0-1)
          <input id="conf" type="number" min="0" max="1" step="0.05" value="0.25" />
        </label>
        <label>
          Pixels per cm
          <input id="pixelsPerCm" type="number" min="1" step="0.1" value="10" />
        </label>
      </div>

      <div class="actions">
        <button id="captureBtn">Capture + Estimate</button>
        <button class="secondary" id="switchBtn">Switch Camera</button>
      </div>

      <div id="status" class="status"></div>
    </section>

    <section class="panel">
      <h2 style="margin:0 0 8px;font-size:1.05rem;">Latest Result</h2>
      <p id="summary" class="muted">No inference yet.</p>
      <ul id="detections" class="result-list"></ul>
    </section>
  </main>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const camera = document.getElementById("camera");
    const canvas = document.getElementById("canvas");
    const statusEl = document.getElementById("status");
    const summaryEl = document.getElementById("summary");
    const detectionsEl = document.getElementById("detections");
    const captureBtn = document.getElementById("captureBtn");
    const switchBtn = document.getElementById("switchBtn");
    const confInput = document.getElementById("conf");
    const pixelsPerCmInput = document.getElementById("pixelsPerCm");

    let stream;
    let facingMode = "environment";

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.className = isError ? "status error" : "status";
    }

    async function startCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: facingMode } },
          audio: false,
        });
        camera.srcObject = stream;
        setStatus("Camera ready.");
      } catch (error) {
        setStatus("Unable to access camera. Use HTTPS or localhost and allow permissions.", true);
      }
    }

    async function captureAndEstimate() {
      if (!camera.videoWidth || !camera.videoHeight) {
        setStatus("Camera not ready yet.", true);
        return;
      }

      captureBtn.disabled = true;
      setStatus("Sending frame for biomass estimation...");

      canvas.width = camera.videoWidth;
      canvas.height = camera.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(camera, 0, 0, canvas.width, canvas.height);

      const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.92));
      const form = new FormData();
      form.append("file", blob, `capture-${Date.now()}.jpg`);
      form.append("conf", confInput.value);
      form.append("pixels_per_cm", pixelsPerCmInput.value);

      try {
        const response = await fetch("/predict-biomass", { method: "POST", body: form });
        const payload = await response.json();

        if (!response.ok) {
          throw new Error(payload.detail || "Inference failed");
        }

        renderResult(payload);
        setStatus("Inference complete.");
      } catch (error) {
        setStatus(error.message || "Failed to estimate biomass.", true);
      } finally {
        captureBtn.disabled = false;
      }
    }

    function renderResult(payload) {
      summaryEl.textContent = `Fish count: ${payload.fish_count} | Total biomass: ${payload.total_estimated_biomass_g} g`;
      detectionsEl.innerHTML = "";

      if (!payload.detections.length) {
        const item = document.createElement("li");
        item.textContent = "No fish detected in this frame.";
        detectionsEl.appendChild(item);
        return;
      }

      payload.detections.forEach(det => {
        const item = document.createElement("li");
        item.textContent = `${det.class_name} | conf ${det.confidence} | length ${det.estimated_length_cm} cm | weight ${det.estimated_weight_g} g`;
        detectionsEl.appendChild(item);
      });
    }

    captureBtn.addEventListener("click", captureAndEstimate);
    switchBtn.addEventListener("click", async () => {
      facingMode = facingMode === "environment" ? "user" : "environment";
      await startCamera();
    });

    startCamera();
  </script>
</body>
</html>
